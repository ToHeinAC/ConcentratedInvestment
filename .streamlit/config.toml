[server]
headless = true
# Behind Railway's reverse proxy the WebSocket was dropping and Streamlit kept
# rebuilding the session (UI resetting). These let the WS survive the proxy.
enableWebsocketCompression = false
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[theme]
primaryColor             = "#234637"
backgroundColor          = "#f6f7f2"
secondaryBackgroundColor = "#eaf0ec"
textColor                = "#1a1f1c"
font                     = "sans serif"
